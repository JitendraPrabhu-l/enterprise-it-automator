name: Regenerate MCP tool baseline

# Manually-triggered only — NOT automatic on every drift-gate failure. The
# whole point of app/mcp_server/tool_baseline.json (app/agent/tool_integrity.py)
# is requiring a HUMAN to notice and review a tool-definition change before
# it's trusted; auto-committing whatever CI computes on every failure would
# silently launder an actual unreviewed/malicious tool change past the check
# it exists to catch, which is worse than the bug this workflow fixes.
#
# What this DOES fix: tests/test_tool_baseline.py's drift gate compares a
# COMMITTED file against a LIVE computation — if that file was ever hand-
# generated on a developer's own machine (scripts/generate_tool_baseline.py
# run locally), it can byte-differ from what CI computes purely from
# pydantic-core/library version differences having nothing to do with any
# actual tool change (confirmed live, twice, this is a real failure mode).
# Running the SAME generator inside THIS workflow instead means the
# committed file is always produced by, and therefore always matches,
# the exact environment the drift gate itself runs in.
#
# Usage: after an INTENTIONAL tool change (or if the drift gate fails and
# you've confirmed via the diff that it's not a real tool-poisoning
# signal), trigger this from the Actions tab ("Run workflow") instead of
# running scripts/generate_tool_baseline.py locally and committing the
# result yourself.
#
# Opens a PR rather than pushing straight to main: this repo's branch
# protection requires changes to go through a PR, and the default
# GITHUB_TOKEN has no bypass for that rule the way an owner's own
# credentials do (confirmed live — a direct `git push origin HEAD:main`
# here failed on exactly this). A PR is also a strictly better fit for
# this workflow's own "a human reviews before it's trusted" design intent
# than a direct push would have been anyway.
on:
  workflow_dispatch: {}

jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.lock.txt

      - name: Regenerate app/mcp_server/tool_baseline.json in this environment
        run: python -m scripts.generate_tool_baseline

      - name: Show diff in the step summary (for review before opening a PR)
        run: |
          echo '## tool_baseline.json diff' >> "$GITHUB_STEP_SUMMARY"
          echo '```diff' >> "$GITHUB_STEP_SUMMARY"
          git diff -- app/mcp_server/tool_baseline.json >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Open a PR with the regenerated baseline, if it changed
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: |
            ci: regenerate tool_baseline.json in CI's own environment

            Opened by regenerate-tool-baseline.yml (manually triggered) — see
            that workflow's comments and app/agent/tool_integrity.py for why
            the committed baseline must be produced by CI, not a dev machine.
          title: "ci: regenerate tool_baseline.json in CI's own environment"
          body: |
            Auto-generated by [regenerate-tool-baseline.yml](../actions/workflows/regenerate-tool-baseline.yml),
            triggered manually. Review the diff (also posted to this run's
            step summary) before merging — it should touch only the tool(s)
            you actually meant to change; anything else is worth
            investigating before merging.
          branch: regenerate-tool-baseline
          add-paths: app/mcp_server/tool_baseline.json
          delete-branch: true
