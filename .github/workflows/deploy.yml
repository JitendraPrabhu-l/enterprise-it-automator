name: Build and Push Image

# Runs only on merge to main, after CI has already validated the commit via
# ci.yml's pull_request trigger — this workflow doesn't re-lint/re-test, it
# just builds and publishes the image that already passed CI.
on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Image references must be all-lowercase — github.repository preserves
      # the repo's actual casing (JitendraPrabhu-l/enterprise-it-automator),
      # which docker/build-push-action rejects outright before starting any
      # build (verified live: the step failed in ~1s, too fast to have even
      # begun pulling a base image). Lowercasing here is the fix, not
      # renaming the GitHub repo/org.
      - name: Compute lowercase image name
        id: image
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.image.outputs.name }}:latest
            ghcr.io/${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
