name: Build and Push Image

# Runs only on merge to main, after CI has already validated the commit via
# ci.yml's pull_request trigger — this workflow doesn't re-lint/re-test, it
# just builds and publishes the image that already passed CI.
on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Image references must be all-lowercase — github.repository preserves
      # the repo's actual casing (JitendraPrabhu-l/enterprise-it-automator),
      # which docker/build-push-action rejects outright before starting any
      # build (verified live: the step failed in ~1s, too fast to have even
      # begun pulling a base image). Lowercasing here is the fix, not
      # renaming the GitHub repo/org.
      - name: Compute lowercase image name
        id: image
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      # Build (without pushing) first so the image can be scanned BEFORE it
      # is published — a vulnerable image failing the scan never reaches the
      # registry, instead of being yanked after the fact.
      - name: Build image for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ghcr.io/${{ steps.image.outputs.name }}:scan-candidate
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image (Trivy)
        # aquasecurity/trivy-action switched its tag scheme from bare
        # version numbers (0.28.0) to v-prefixed ones (v0.28.0+) upstream —
        # the old bare tag stopped resolving ("Unable to resolve action"),
        # breaking this workflow with no code-level cause. Pinned to a
        # current v-prefixed release; image-ref/format/severity/
        # ignore-unfixed/exit-code below are all still valid inputs on it.
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ steps.image.outputs.name }}:scan-candidate
          format: table
          # Gate on fixable HIGH/CRITICAL OS+library vulns: failing on
          # unfixable ones would just wedge every deploy until upstream
          # ships a patch nobody can apply yet.
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Push scanned image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.image.outputs.name }}:latest
            ghcr.io/${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
