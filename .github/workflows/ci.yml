name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.lock.txt
          pip install ruff mypy pip-audit

      - name: Lint (ruff)
        run: ruff check app/ tests/ evals/

      - name: Typecheck (mypy)
        # Config in pyproject [tool.mypy] — checks app/ (the shipped package).
        run: mypy

      - name: Test with coverage gate (pytest)
        # fail_under lives in pyproject [tool.coverage.report]: the suite
        # fails if app/ line coverage drops below the floor. Includes the
        # golden-ticket eval replay (tests/test_golden_tickets.py) and the
        # migration-drift gate (tests/test_migrations.py).
        run: pytest -q --cov --cov-report=term

      - name: Dependency audit (pip-audit)
        # Audits the LOCKED resolution (what the image actually ships), not
        # the loose ranges. Strict: a known CVE in a pinned dep fails CI so
        # the bump is a deliberate, reviewed act. For a vulnerability with
        # no fixed release yet, add a documented `--ignore-vuln GHSA-...`
        # with a link to the upstream issue — never silence the whole step.
        #
        # --disable-pip skips using pip to re-resolve/verify the listed
        # versions (this file is already a fully-resolved lockfile, so
        # there's nothing left to resolve) — but pip-audit's own CLI
        # requires pairing it with --no-deps, since without EITHER a
        # hashed requirements file or --no-deps it has no way to know the
        # listed versions are the complete, final set to audit rather than
        # a set that still needs transitive deps pulled in. Without
        # --no-deps here, pip-audit refuses to run at all (exit 1 before
        # auditing a single package).
        run: pip-audit -r requirements.lock.txt --disable-pip --no-deps
