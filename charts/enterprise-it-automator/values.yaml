# Default values — every value here mirrors a documented env var (see
# .env.example); the chart is a thin, honest packaging of the same app.

image:
  repository: ghcr.io/jitendraprabhu-l/enterprise-it-automator
  # Pin a release tag (release.yml publishes ghcr.io/...:<semver>) — "latest"
  # is for dev clusters only.
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1
# Scaling past 1 replica is SAFE for the SLA sweep (Postgres advisory lock —
# app/agent/sla_sweep.py) and the checkpointer (Postgres-backed), but the
# in-memory API rate limiter is per-pod: N replicas multiply the effective
# rate limit by N until a shared store backs it. Size accordingly.

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  host: it-automator.example.com
  tls: []
  annotations: {}

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    memory: 1Gi

# All secrets come from ONE Kubernetes Secret, never from values (helm
# release manifests are stored server-side in plaintext-ish secrets and
# leak via `helm get values`). Create it out-of-band or via ESO/sealed
# secrets, with keys named exactly like the env vars:
#
#   kubectl create secret generic it-automator \
#     --from-literal=API_KEY=... \
#     --from-literal=GROQ_API_KEY=... \
#     --from-literal=MCP_SERVER_TOKEN=... \
#     --from-literal=DATABASE_URL='postgresql+asyncpg://user:pw@pg:5432/it_automator' \
#     --from-literal=CHECKPOINT_DB_PATH='postgresql://user:pw@pg:5432/it_automator'
existingSecret: it-automator

# Non-secret env — anything from .env.example can be set here.
env:
  LLM_PROVIDER: groq
  SENSITIVE_ACTIONS: disable_user,enable_user,revoke_access,create_user,grant_access
  MAX_TOKENS_PER_TICKET: "0"
  MAX_TOKENS_PER_CLIENT_PER_DAY: "0"
  MAX_ORG_TOKENS_PER_DAY: "0"
  OIDC_ISSUER: ""
  OIDC_AUDIENCE: ""
  OIDC_USERNAME_CLAIM: preferred_username

# The MCP gateway runs as a sidecar in the same pod (stdio's process model
# doesn't fit separate pods; http transport to localhost keeps the gateway
# off the network entirely — no NetworkPolicy needed for it).
mcpSidecar:
  enabled: true
  port: 8765

# Run `alembic upgrade head` as a pre-install/pre-upgrade hook Job against
# DATABASE_URL before new pods roll out. Disable for clusters that manage
# schema out-of-band.
migrations:
  enabled: true

# Scheduled Postgres backup (docs/RUNBOOKS.md's "Backup / restore" section),
# deliberately using a SEPARATE Secret from `existingSecret` above — the
# whole point is that the backup role's credential (BACKUP_DATABASE_URL,
# a read-only Postgres role: SELECT only, no INSERT/UPDATE/DELETE/DROP)
# must be provisionable/rotatable independently of the app's own read/write
# DATABASE_URL, so a compromised or malicious agent action (which only ever
# holds the APP's credential) can't also reach or destroy the backups.
# Disabled by default — opt in once BOTH the read-only role and this
# separate Secret actually exist; see scripts/backup_db.sh's docstring for
# how to provision the role and scripts/validate_backup_restore.sh for how
# to prove a produced dump is genuinely restorable.
backup:
  enabled: false
  schedule: "0 3 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  # A DIFFERENT Kubernetes Secret name than `existingSecret` above — must
  # contain only BACKUP_DATABASE_URL (and optionally BACKUP_UPLOAD_CMD),
  # e.g.:
  #   kubectl create secret generic it-automator-backup \
  #     --from-literal=BACKUP_DATABASE_URL='postgresql://backup_ro:pw@pg:5432/it_automator'
  existingSecret: it-automator-backup
  # A shell command run against each dump file after it's written (e.g.
  # `aws s3 cp` / `rclone copy`) — the CronJob's image (postgres:16-alpine)
  # ships neither by default; use persistence.enabled (below) for the
  # simplest self-contained option, or build a custom backup image with
  # your upload CLI of choice and override `backup.image` if you need
  # object-storage upload without a sidecar.
  uploadCommand: ""
  image: "postgres:16-alpine"
  # PVC-backed destination for dump files — the default, simplest path
  # ("backups land on a volume, ops pulls them from there or a snapshot
  # policy covers the PVC itself"). Disable only if uploadCommand (or a
  # values override adding an upload sidecar) is the real destination —
  # an emptyDir means every dump is lost the moment its Job pod is GC'd.
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false  # /app/data holds runtime scratch on SQLite fallback
  capabilities:
    drop: ["ALL"]
