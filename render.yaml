# Render Blueprint — deploys the pre-built image already published to GHCR.
# No build step: Render just pulls ghcr.io/jitendraprabhu-l/enterprise-it-automator,
# the same image verified locally via docker-compose and pushed by
# .github/workflows/deploy.yml.
#
# MCP_TRANSPORT is left at its default ("stdio") — the agent spawns the MCP
# server as an in-process subprocess, so this is a single Render service, not
# the two-service split docker-compose.yml uses for demonstrating the
# standalone-HTTP-transport shape. No MCP_SERVER_TOKEN/MCP_ALLOWED_HOSTS
# needed under stdio.
#
# Every secret below uses `sync: false` — Render prompts for the real value
# once when the Blueprint is first created and never overwrites it on later
# syncs, so nothing sensitive is ever committed to this public repo. Fill
# real values in via the Render dashboard, not by editing this file.
#
# To use: Render dashboard → New → Blueprint → point at this repo → it reads
# this file automatically.

services:
  - name: enterprise-it-automator
    type: web
    runtime: image
    image:
      url: ghcr.io/jitendraprabhu-l/enterprise-it-automator:latest
    plan: free
    healthCheckPath: /health
    envVars:
      # --- Required secrets: set these in the Render dashboard, not here ---
      - key: API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CHECKPOINT_DB_PATH
        sync: false
      - key: GROQ_API_KEY
        sync: false

      # Optional: a separate, low-privilege key auto-served from GET /demo-key
      # so a stranger can try the public dashboard without a real credential
      # — see .env.example's DEMO_API_KEY comment. sync:false (not a plain
      # `value:`) so it isn't accidentally left unset/generic — you still
      # choose to opt in by setting a real value in the dashboard. Leave
      # blank/unset entirely to disable the demo-key feature.
      - key: DEMO_API_KEY
        sync: false

      # Optional: lets a real reviewer approve/reject sensitive actions from
      # Telegram instead of only the dashboard — see .env.example's
      # TELEGRAM_BOT_TOKEN comment and DEPLOYMENT.md's Step 8. Leave
      # blank/unset entirely to disable this feature.
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false

      # Optional: lets a reviewer get a plain email when an approval needs
      # their decision, instead of only the dashboard/Telegram — see
      # .env.example's SMTP_HOST comment and DEPLOYMENT.md's Step 8. Leave
      # blank/unset entirely to disable this feature.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_ADDRESS
        sync: false

      # --- Non-secret config, safe to commit ---
      - key: LLM_PROVIDER
        value: groq
      # 70b, not the code-default 8b: the live golden-ticket eval measured
      # 8b at 3/6 (hallucinated tool name, category misses) vs 70b at 5/6
      # (2026-07-13, `python -m evals.run_live`) — see README's "Notes on
      # model choice". If this org ever loses 70b access, drop back to
      # llama-3.1-8b-instant and expect degraded planning quality.
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: SENSITIVE_ACTIONS
        value: disable_user,enable_user,revoke_access,create_user,grant_access,grant_app_access,revoke_app_access
      - key: APPROVAL_SLA_MINUTES
        value: "60"
      - key: SLA_SWEEP_INTERVAL_SECONDS
        value: "300"
