# docker-compose.yml for local/dev container orchestration.
#
# NOTE on Postgres scope: DATABASE_URL below points the APP DB at Postgres.
# app/db/session.py is already database-agnostic (plain SQLAlchemy
# create_async_engine on whatever URL is configured) and asyncpg is a base
# dependency, so this should work — not yet validated against a live
# container here (blocked on a local Docker credential-helper issue during
# development; written to be validated once that's resolved). CHECKPOINT_DB_PATH
# below is now also a Postgres URL: app/agent/runner.py picks AsyncPostgresSaver
# instead of AsyncSqliteSaver whenever this value starts with "postgresql://"
# (a plain psycopg-style URL — deliberately not "+asyncpg", since
# langgraph-checkpoint-postgres depends on psycopg, not asyncpg, even though
# it's the same physical Postgres instance as DATABASE_URL). Still equally
# unvalidated against a live container as the app DB, for the same reason.
#
# The mcp-server service demonstrates the "remote MCP server" deployment
# shape (MCP_TRANSPORT=http) — the app connects to it over the network
# instead of spawning it as a stdio subprocess, the same integration path a
# real orchestrator (e.g. watsonx Orchestrate) would use. Comment it out and
# set MCP_TRANSPORT=stdio on the app service to go back to the zero-config
# local-subprocess default.
#
# SECURITY: mcp-server binds to 0.0.0.0 inside its container (required —
# 127.0.0.1 would make it unreachable even from the `app` service on
# Docker's internal bridge network), but deliberately has NO `ports:`
# mapping published to the host — only `app` needs to reach it, via
# Docker's internal DNS (MCP_SERVER_URL: http://mcp-server:8765/mcp
# below), never from outside the compose network. Publishing 8765 to the
# host here would needlessly expose the bearer-token-protected MCP gateway
# to anything else running on the host machine (or, if the host's own
# firewall/NAT is permissive, the wider network) for no operational
# benefit — bearer-token auth (server.py) and DNS-rebinding Host/Origin
# validation (MCP_ALLOWED_HOSTS/MCP_ALLOWED_ORIGINS) are real defenses,
# but "don't expose the port at all" is a strictly stronger one available
# here for free.
#
# SECURITY: POSTGRES_PASSWORD and API_KEY are both required (compose's `:?`
# syntax) with no fallback default — this file previously fell back to a
# publicly-documented default Postgres password (itauto_dev_pw) with no
# runtime warning if left unset, unlike MCP_SERVER_TOKEN which already
# hard-failed. Both secrets now fail fast the same way MCP_SERVER_TOKEN
# does: `docker compose up` refuses to start at all rather than silently
# running with a known-weak/no credential. Export real values in your shell
# or an untracked .env before running compose.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: itauto
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set — no insecure default is provided}
      POSTGRES_DB: it_automator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itauto -d it_automator"]
      interval: 5s
      timeout: 5s
      retries: 10

  mcp-server:
    build: .
    command:
      ["python", "-m", "app.mcp_server.server", "--transport", "http"]
    environment:
      DATABASE_URL: postgresql+asyncpg://itauto:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set — no insecure default is provided}@postgres:5432/it_automator
      MCP_TRANSPORT: http
      MCP_SERVER_HOST: 0.0.0.0
      MCP_SERVER_PORT: "8765"
      MCP_SERVER_TOKEN: ${MCP_SERVER_TOKEN:?MCP_SERVER_TOKEN must be set — the http transport refuses to start without it}
      # The default MCP_ALLOWED_HOSTS (127.0.0.1:<port>/localhost:<port>)
      # wouldn't match the Host header on requests from the `app` service,
      # which reaches this container via Docker's internal DNS name
      # (mcp-server:8765, see MCP_SERVER_URL on the app service below) —
      # must be listed explicitly or every real request gets a 421
      # (DNS-rebinding Host-header rejection) from the mcp SDK's own
      # TransportSecurityMiddleware.
      MCP_ALLOWED_HOSTS: mcp-server:8765
      SENSITIVE_ACTIONS: disable_user,enable_user,revoke_access,create_user,grant_access
    # No `ports:` mapping — intentional, see the SECURITY note above this
    # service. Only `app` needs to reach mcp-server, over the internal
    # compose network; nothing here needs to be reachable from the host.
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://itauto:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set — no insecure default is provided}@postgres:5432/it_automator
      CHECKPOINT_DB_PATH: postgresql://itauto:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set — no insecure default is provided}@postgres:5432/it_automator
      MCP_TRANSPORT: http
      MCP_SERVER_URL: http://mcp-server:8765/mcp
      MCP_SERVER_TOKEN: ${MCP_SERVER_TOKEN:?MCP_SERVER_TOKEN must be set — the http transport refuses to start without it}
      SENSITIVE_ACTIONS: disable_user,enable_user,revoke_access,create_user,grant_access
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-5}
      WATSONX_API_KEY: ${WATSONX_API_KEY:-}
      WATSONX_PROJECT_ID: ${WATSONX_PROJECT_ID:-}
      WATSONX_URL: ${WATSONX_URL:-https://us-south.ml.cloud.ibm.com}
      WATSONX_MODEL: ${WATSONX_MODEL:-ibm/granite-3-8b-instruct}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-meta-llama/llama-3.3-70b-instruct:free}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      API_KEY: ${API_KEY:?API_KEY must be set — the app would otherwise start with all API auth disabled}
      # Optional — a separate, low-privilege key served unauthenticated from
      # GET /demo-key for public demo/portfolio deployments; see
      # .env.example's DEMO_API_KEY comment. Leave unset to disable.
      DEMO_API_KEY: ${DEMO_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - app_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      mcp-server:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  app_data:
